- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  id: HALOWeaponRifleMA5C
  name: MA5C ICWS assault rifle
  description: Belonging to the MA5 individual combat weapons system platform and produced by Misriah Armory, the MA5C is a staple weapon among the UNSC marine corps. It uses a box magazine capable of holding 32 7.62x51mm full-metal-jacket rounds.
  components:
  - type: Sprite
    sprite: _HALO14/Objects/Weapons/Guns/Rifles/ma5c.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _HALO14/Objects/Weapons/Guns/Rifles/ma5c.rsi
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    shotsPerBurst: 4
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      collection: HALOMA5CShoot
  - type: RMCGunChamber
    sound: /Audio/_HALO14/Weapons/Guns/Cock/gun_ma5c_cocked.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilUnwielded: 4
    scatterWielded: 1
    scatterUnwielded: 20
    baseFireRate: 4
    burstScatterMult: 1
    recoilWielded: 3
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.3
    accuracyMultiplierUnwielded: 0.65
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_HALO14/Weapons/Guns/Reload/gun_ma5c_reload.ogg
        ejectSound: /Audio/_HALO14/Weapons/Guns/Reload/gun_ma5c_unload.ogg
        priority: 2
        whitelist:
          tags:
          - HALOMagazineRifleMA5C
          - HALOMagazineRifleMA5CShredder
  - type: GunDamageModifier
    multiplier: 1.1
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        locked: true
        startingAttachable: HALOAttachmentMA5CBarrel
        whitelist:
          tags:
          - HALOAttachmentMA5CBarrel
      rmc-aslot-rail:
        locked: true
        startingAttachable: HALOAttachmentMA5CShroud
        whitelist:
          tags:
          - HALOAttachmentMA5CShroud
      rmc-aslot-underbarrel:
        startingAttachable: HALOAttachmentMA5Flashlight
        whitelist:
          tags:
          - HALOAttachmentMA5Flashlight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.466, 0.0256
      rmc-aslot-rail: 0.466, 0.0256
      rmc-aslot-underbarrel: 0.466, 0.0256
  - type: Tag
    tags:
    - HALOWeaponRifleMA5C

- type: entity
  parent: HALOWeaponRifleMA5C
  id: HALOWeaponRifleMA5CFilled
  suffix: Filled
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: HALOMagazineRifleMA5C
        insertSound: /Audio/_HALO14/Weapons/Guns/Reload/gun_ma5c_reload.ogg
        ejectSound: /Audio/_HALO14/Weapons/Guns/Reload/gun_ma5c_unload.ogg
        priority: 2
        whitelist:
          tags:
          - HALOMagazineRifleMA5C
          - HALOMagazineRifleMA5CShredder

- type: entity
  parent: CMMagazineRifleBase
  id: HALOMagazineRifleMA5C
  name: MA5C magazine (7.62x51mm FMJ)
  description: A rectangular box magazine for the MA5C holding 48 rounds of 7.62x51 FMJ ammunitions.
  components:
  - type: Tag
    tags:
    - HALOMagazineRifle
    - HALOMagazineRifleMA5C
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - HALOCartridgeRifle762x51mm
    proto: HALOCartridgeRifle762x51mm
    capacity: 48
  - type: Sprite
    sprite: _HALO14/Objects/Weapons/Guns/Ammunition/UNSC/Magazines/ma5c.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance
  - type: RefillableByBulletBox
    bulletType: RMCBoxBulletsRifle

- type: entity
  parent: HALOMagazineRifleMA5C
  id: HALOMagazineRifleMA5CShredder
  name: MA5C magazine (7.62x51mm Shredder)
  description: A rectangular box magazine for the MA5C holding 60 rounds of 7.62x51 shredder ammunitions, a specialized ammunition that pierces armor and splinters in the target.
  components:
  - type: Tag
    tags:
    - HALOMagazineRifle
    - HALOMagazineRifleMA5CShredder
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - HALOCartridgeRifleShredder762x51mm
    proto: HALOCartridgeRifleShredder762x51mm
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#994545"
  - type: RefillableByBulletBox
    bulletType: RMCBoxBulletsRifleAP

- type: entity
  parent: CMBaseCartridgeRifle
  id: HALOCartridgeRifle762x51mm
  name: cartridge (7.62x51mm)
  description: A 7.62x51mm cartridge. Fits in 7.62x51mm magazines.
  components:
  - type: Tag
    tags:
    - Cartridge
    - HALOCartridgeRifle762x51mm
  - type: CartridgeAmmo
    proto: HALOBulletRifle762x51mm

- type: entity
  parent: CMBaseCartridgeRifle
  id: HALOCartridgeRifleShredder762x51mm
  name: cartridge (7.62x51mm)
  description: A 7.62x51mm cartridge. Fits in 7.62x51mm magazines.
  components:
  - type: Tag
    tags:
    - Cartridge
    - HALOCartridgeRifleShredder762x51mm
  - type: CartridgeAmmo
    proto: HALOBulletRifleShredder762x51mm

- type: entity
  parent: RMCBaseBullet
  id: HALOBulletRifle762x51mm
  name: FMJ bullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 40
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 24
      falloff: 9999
      ignoreModifiers: true
    - range: 7
      falloff: 4
  - type: CMArmorPiercing
    amount: 5
  - type: RMCProjectileAccuracy
    accuracy: 105
    thresholds:
    - range: 16
      falloff: 10

- type: entity
  parent: HALOBulletRifle762x51mm
  id: HALOBulletRifleShredder762x51mm
  name: shredder bullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 52
  - type: CMArmorPiercing
    amount: 10

